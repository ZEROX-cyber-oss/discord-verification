<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZEROX Vérification</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 55%, rgba(190, 20, 80, 0.45), transparent 28%),
        radial-gradient(circle at 80% 55%, rgba(190, 20, 80, 0.45), transparent 28%),
        radial-gradient(circle at center, rgba(80, 10, 35, 0.55), transparent 45%),
        linear-gradient(135deg, #07070b, #150812, #030305);
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 65%, rgba(255, 40, 115, 0.35), transparent 18%),
        radial-gradient(circle at 85% 65%, rgba(255, 40, 115, 0.35), transparent 18%);
      filter: blur(20px);
      opacity: 0.8;
    }

    .zerox {
      position: absolute;
      top: 55px;
      font-size: 115px;
      font-weight: 900;
      letter-spacing: 22px;
      color: rgba(255, 55, 120, 0.22);
      text-shadow: 0 0 18px rgba(255, 55, 120, 0.25);
      filter: blur(2px);
    }

    .verified {
      position: absolute;
      top: 205px;
      font-size: 26px;
      letter-spacing: 24px;
      color: rgba(255, 65, 130, 0.75);
    }

    .card {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 680px;
      padding: 55px 55px 50px;
      text-align: center;
      border-radius: 24px;
      background: rgba(15, 17, 23, 0.82);
      border: 1px solid rgba(255, 65, 130, 0.8);
      box-shadow: 0 0 30px rgba(255, 45, 120, 0.35);
      backdrop-filter: blur(18px);
    }

    .shield {
      font-size: 58px;
      color: #ff3c7d;
      margin-bottom: 25px;
      text-shadow: 0 0 25px rgba(255, 60, 125, 0.9);
    }

    h1 {
      font-size: 54px;
      margin: 0;
      font-weight: 800;
    }

    .line {
      width: 55px;
      height: 2px;
      background: #ff3c7d;
      margin: 25px auto;
      box-shadow: 0 0 18px #ff3c7d;
    }

    p {
      font-size: 24px;
      color: #cfd1d8;
      line-height: 1.5;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      background: linear-gradient(135deg, #ff3d7e, #f12d70);
      color: white;
      text-decoration: none;
      font-size: 25px;
      font-weight: bold;
      padding: 22px 55px;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(255, 55, 120, 0.65);
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.04);
      box-shadow: 0 0 45px rgba(255, 55, 120, 1);
    }

    .small {
      margin-top: 35px;
      font-size: 19px;
      color: #c9c9c9;
    }

    @media (max-width: 700px) {
      .zerox {
        font-size: 55px;
        letter-spacing: 10px;
        top: 70px;
      }

      .verified {
        top: 145px;
        font-size: 16px;
        letter-spacing: 12px;
      }

      .card {
        padding: 40px 25px;
      }

      h1 {
        font-size: 38px;
      }

      p {
        font-size: 18px;
      }

      .btn {
        font-size: 18px;
        padding: 18px 25px;
      }
    }
  </style>
</head>
<body>

  <div class="zerox">ZEROX</div>
  <div class="verified">VÉRIFIÉ</div>

  <div class="card">
    <div class="shield">🛡️</div>

    <h1>Bienvenue 🌹</h1>
    <div class="line"></div>

    <p>Vérifie ton compte Discord pour accéder à l'ensemble du serveur.</p>

    <a class="btn" href="/login">🎮 Se vérifier avec Discord</a>

    <div class="small">🔒 Vérification sécurisée via Discord OAuth2</div>
  </div>

</body>
</html>
